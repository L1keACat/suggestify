<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Suggestify plugin</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@100;200;300;400;500;600;700;800;900&display=swap"
          rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>
<div>
    <div class="header">
        <h1>
            <a href="https://github.com/L1keACat/suggestify" target="_blank">
                Suggestify<span class="highlighted">.js</span>
            </a>
        </h1>
        <h4 class="subheader"><span class="highlighted">Smarter</span> Input, <span class="highlighted">Faster</span>
            Typing</h4>
    </div>
    <div class="content">
        <div class="options">
            <div class="option">
                <input type="checkbox" id="allowWhitespace" name="allowWhitespace"/>
                <label for="allowWhitespace">Allow whitespace</label>
            </div>
            <div class="option">
                <input type="checkbox" id="matchPrefix" name="matchPrefix"/>
                <label for="matchPrefix">Match prefix only</label>
            </div>
            <div class="option">
                <input type="checkbox" id="matchWordStart" name="matchWordStart"/>
                <label for="matchWordStart">Match word start</label>
            </div>
        </div>
        <input id="suggestify" type="text" autocomplete="off" placeholder="Enter any capital"/>
    </div>
</div>

<p class="author">
    Developed by <a class="highlighted" href="https://github.com/L1keACat" target="_blank">L1keACat</a>
</p>
</body>

            suggestions._options.allowWhitespace = flag;
        }
        suggestions._options.matchWordStart = event.target.checked;
